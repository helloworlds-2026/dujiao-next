name: Upstream Merge And Build Check

on:
  workflow_dispatch:
    inputs:
      custom_branch:
        description: Branch to check in private repos
        required: false
        default: main
  schedule:
    - cron: '30 2 * * *'

permissions:
  contents: write

concurrency:
  group: upstream-merge-build-check
  cancel-in-progress: false

env:
  CUSTOM_BRANCH: ${{ github.event.inputs.custom_branch || vars.CUSTOM_BRANCH || 'main' }}
  GH_USERNAME: ${{ secrets.GH_USERNAME }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

  API_REPO_URL: ${{ vars.API_REPO_URL }}
  USER_REPO_URL: ${{ vars.USER_REPO_URL }}
  ADMIN_REPO_URL: ${{ vars.ADMIN_REPO_URL }}

  API_UPSTREAM_URL: ${{ vars.API_UPSTREAM_URL || 'https://github.com/dujiao-next/dujiao-next.git' }}
  USER_UPSTREAM_URL: ${{ vars.USER_UPSTREAM_URL || 'https://github.com/dujiao-next/user.git' }}
  ADMIN_UPSTREAM_URL: ${{ vars.ADMIN_UPSTREAM_URL || 'https://github.com/dujiao-next/admin.git' }}

  ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}

jobs:
  merge-and-build:
    name: Merge check and build all repos
    runs-on: ubuntu-latest

    steps:
      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for v in GH_USERNAME GH_TOKEN API_REPO_URL USER_REPO_URL ADMIN_REPO_URL; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required value: $v"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Please set repository variables/secrets before running this workflow." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync with upstream, build and push (all-or-nothing)
        shell: bash
        run: |
          set -euo pipefail

          with_auth() {
            local url="$1"
            if [[ "$url" =~ ^https://github.com/ ]]; then
              printf '%s' "https://${GH_USERNAME}:${GH_TOKEN}@${url#https://}"
            else
              printf '%s' "$url"
            fi
          }

          run_one() {
            local name="$1"
            local repo_url="$2"
            local upstream_url="$3"
            local branch="$4"
            local before_sha after_sha merged=0

            local repo_auth_url upstream_auth_url
            repo_auth_url="$(with_auth "$repo_url")"
            upstream_auth_url="$(with_auth "$upstream_url")"

            echo ""
            echo "=== [$name] clone and merge-check ==="

            git clone --filter=blob:none "$repo_auth_url" "$name" || {
              echo "::error::[$name] git clone failed"
              return 1
            }
            cd "$name"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git remote add upstream "$upstream_auth_url"
            git fetch --prune origin "$branch" || {
              echo "::error::[$name] fetch origin/$branch failed"
              cd ..
              return 1
            }

            if ! git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              echo "::error::[$name] branch origin/$branch not found"
              cd ..
              return 1
            fi

            git checkout -B "$branch" "origin/$branch" || {
              echo "::error::[$name] checkout branch failed"
              cd ..
              return 1
            }
            git fetch --prune upstream main || {
              echo "::error::[$name] fetch upstream/main failed"
              cd ..
              return 1
            }

            before_sha="$(git rev-parse HEAD)"
            if git merge --no-ff --no-edit "upstream/main"; then
              after_sha="$(git rev-parse HEAD)"
              if [ "$before_sha" != "$after_sha" ]; then
                merged=1
                echo "[$name] merged upstream/main into $branch"
              else
                echo "[$name] already up-to-date with upstream/main"
              fi
            else
              echo "::error::[$name] merge conflict with upstream/main"
              git merge --abort || true
              cd ..
              return 1
            fi

            echo "=== [$name] build ==="
            if [ "$name" = "api" ]; then
              go mod download || {
                echo "::error::[$name] go mod download failed"
                cd ..
                return 1
              }
              go build -trimpath -o /tmp/api-server ./cmd/server || {
                echo "::error::[$name] go build failed"
                cd ..
                return 1
              }
            else
              npm ci || {
                echo "::error::[$name] npm ci failed"
                cd ..
                return 1
              }
              npm run build || {
                echo "::error::[$name] npm run build failed"
                cd ..
                return 1
              }
            fi

            if [ "$merged" -eq 1 ]; then
              printf '%s\n' "$name" >> ../_repos_to_push.txt
              echo "[$name] queued for push after all repositories pass"
            else
              echo "[$name] skip push (no upstream changes)"
            fi

            cd ..
            return 0
          }

          push_one() {
            local name="$1"
            local branch="$2"

            [ -d "$name/.git" ] || {
              echo "::error::[$name] repo directory missing before push"
              return 1
            }

            echo "=== [$name] push merged commit ==="
            cd "$name"
            git push origin "HEAD:$branch" || {
              echo "::error::[$name] push failed"
              cd ..
              return 1
            }
            cd ..
            echo "[$name] pushed merged commit to origin/$branch"
            return 0
          }

          failed=0
          : > _repos_to_push.txt

          if ! run_one api "$API_REPO_URL" "$API_UPSTREAM_URL" "$CUSTOM_BRANCH"; then
            failed=1
          fi
          if ! run_one user "$USER_REPO_URL" "$USER_UPSTREAM_URL" "$CUSTOM_BRANCH"; then
            failed=1
          fi
          if ! run_one admin "$ADMIN_REPO_URL" "$ADMIN_UPSTREAM_URL" "$CUSTOM_BRANCH"; then
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more repositories failed merge-check/build." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          while IFS= read -r repo_name; do
            [ -z "$repo_name" ] && continue
            push_one "$repo_name" "$CUSTOM_BRANCH"
          done < _repos_to_push.txt

          {
            echo "## Upstream Merge And Build Check"
            echo "- Branch: $CUSTOM_BRANCH"
            echo "- Result: success"
            echo "- Repositories: api, user, admin"
            echo "- Action: merge from upstream/main, build all repos, then push merged commits when all pass"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Optional webhook alert on failure
        if: ${{ failure() && env.ALERT_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload="{\"text\":\"[dujiao-next] Upstream merge/build check failed. Branch=${CUSTOM_BRANCH}. Run=${run_url}\"}"
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$ALERT_WEBHOOK_URL"
